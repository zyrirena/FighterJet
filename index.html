<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛩️ FighterJet - Plane Shooter Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .game-title {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .game-subtitle { 
            font-size: 1rem; 
            color: #888; 
            margin-bottom: 20px; 
        }

        .game-container {
            position: relative;
            border: 4px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
        }

        #gameCanvas { 
            display: block; 
            background: #0a0a1a; 
        }

        .menu-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .menu-overlay.hidden { display: none; }

        .menu-title {
            font-size: 2.5rem;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            width: 200px;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-easy { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #000; }
        .btn-easy:hover { transform: scale(1.1); box-shadow: 0 0 30px #00ff88; }
        .btn-medium { background: linear-gradient(135deg, #ffcc00, #ff9900); color: #000; }
        .btn-medium:hover { transform: scale(1.1); box-shadow: 0 0 30px #ffcc00; }
        .btn-hard { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; }
        .btn-hard:hover { transform: scale(1.1); box-shadow: 0 0 30px #ff4444; }

        .controls-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            text-align: center;
        }

        .controls-info h3 { color: #00ff88; margin-bottom: 10px; }
        .controls-info p { margin: 5px 0; color: #ccc; }
        
        .key {
            display: inline-block;
            background: #333;
            padding: 3px 10px;
            border-radius: 5px;
            border: 1px solid #555;
            font-family: monospace;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid #00ff88;
        }

        .hud-item { font-size: 1rem; font-weight: bold; }
        .hud-score { color: #00ff88; }
        .hud-lives { color: #ff4444; }
        .hud-level { color: #ffcc00; }
        .hud-laser { color: #00ccff; }

        .game-over-text {
            font-size: 3rem;
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444;
            margin-bottom: 20px;
        }

        .final-score { font-size: 1.5rem; margin-bottom: 30px; }

        .monkey-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.8);
            animation: monkeyBounce 0.5s ease-in-out;
        }

        .monkey-overlay.hidden { display: none; }
        .monkey-emoji { font-size: 150px; animation: monkeyShake 0.3s infinite; }
        
        .cheater-text {
            font-size: 4rem;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            font-weight: bold;
            animation: textPulse 0.2s infinite;
        }

        @keyframes monkeyBounce { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes monkeyShake { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
        @keyframes textPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .pause-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #ffcc00;
            text-shadow: 0 0 20px #ffcc00;
            z-index: 150;
        }

        .pause-overlay.hidden { display: none; }
    </style>
</head>
<body>
    <h1 class="game-title">🛩️ FIGHTERJET</h1>
    <p class="game-subtitle">Defend the skies!</p>

    <div class="game-container">
        <div class="hud">
            <span class="hud-item hud-score">Score: <span id="scoreDisplay">0</span></span>
            <span class="hud-item hud-level">Level: <span id="levelDisplay">Easy</span></span>
            <span class="hud-item hud-laser">Laser: <span id="laserDisplay">Ready</span></span>
            <span class="hud-item hud-lives">Lives: <span id="livesDisplay">❤️❤️❤️</span></span>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="menu-overlay" id="menuOverlay">
            <h2 class="menu-title">🛩️ FIGHTERJET</h2>
            <button class="difficulty-btn btn-easy" onclick="startGame('easy')">Easy</button>
            <button class="difficulty-btn btn-medium" onclick="startGame('medium')">Medium</button>
            <button class="difficulty-btn btn-hard" onclick="startGame('hard')">Hard</button>
            <div class="controls-info">
                <h3>🎮 Controls</h3>
                <p><span class="key">←</span> <span class="key">→</span> Move</p>
                <p><span class="key">SPACE</span> Shoot</p>
                <p><span class="key">L</span> Laser</p>
                <p><span class="key">P</span> Pause</p>
                <p><span class="key">Z</span> ???</p>
            </div>
        </div>

        <div class="menu-overlay hidden" id="gameOverOverlay">
            <h2 class="game-over-text">GAME OVER</h2>
            <p class="final-score">Final Score: <span id="finalScore">0</span></p>
            <button class="difficulty-btn btn-easy" onclick="startGame('easy')">Easy</button>
            <button class="difficulty-btn btn-medium" onclick="startGame('medium')">Medium</button>
            <button class="difficulty-btn btn-hard" onclick="startGame('hard')">Hard</button>
        </div>

        <div class="monkey-overlay hidden" id="monkeyOverlay">
            <div class="monkey-emoji">🐵</div>
            <div class="cheater-text">CHEATER!</div>
        </div>

        <div class="pause-overlay hidden" id="pauseOverlay">⏸️ PAUSED</div>
    </div>

<script>
// =========================================================
// CANVAS & UI ELEMENTS
// =========================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const laserDisplay = document.getElementById('laserDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const menuOverlay = document.getElementById('menuOverlay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const monkeyOverlay = document.getElementById('monkeyOverlay');
const pauseOverlay = document.getElementById('pauseOverlay');
const finalScoreDisplay = document.getElementById('finalScore');

// =========================================================
// DIFFICULTY SETTINGS & GAME STATE
// =========================================================
const difficultySettings = {
    easy: { maxEnemies: 20, spawnInterval: 1000, enemySpeed: 2, scoreMultiplier: 1 },
    medium: { maxEnemies: 25, spawnInterval: 500, enemySpeed: 3, scoreMultiplier: 2 },
    hard: { maxEnemies: 30, spawnInterval: 500, enemySpeed: 4, scoreMultiplier: 3 }
};

let gameState = {
    isRunning: false,
    isPaused: false,
    difficulty: 'easy',
    score: 0,
    lives: 3,
    lastSpawnTime: 0,
    laserCooldown: 0,
    laserMaxCooldown: 3000,
    animationFrameId: null
};

// =========================================================
// GAME OBJECTS & ARRAYS
// =========================================================
const player = { x: 375, y: 520, width: 50, height: 60, speed: 7 };
let enemies = [];
let bullets = [];
let lasers = [];
let explosions = [];
let stars = [];

// =========================================================
// INPUT TRACKING
// =========================================================
const keys = { left: false, right: false, space: false, l: false, z: false, p: false };
let lastBulletTime = 0;
let lastPauseTime = 0;
let lastCheatTime = 0;

document.addEventListener('keydown', (e) => {
    if (['ArrowLeft','ArrowRight','Space','KeyL','KeyZ','KeyP','KeyA','KeyD'].includes(e.code)) {
        e.preventDefault();
    }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'Space') keys.space = true;
    if (e.code === 'KeyL') keys.l = true;
    if (e.code === 'KeyZ') keys.z = true;
    if (e.code === 'KeyP') keys.p = true;
});

document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'Space') keys.space = false;
    if (e.code === 'KeyL') keys.l = false;
    if (e.code === 'KeyZ') keys.z = false;
    if (e.code === 'KeyP') keys.p = false;
});

// =========================================================
// INITIALIZATION FUNCTIONS
// =========================================================
function initStars() {
    stars = [];
    for (let i = 0; i < 100; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 1.5 + 0.5
        });
    }
}

function resetGame() {
    player.x = canvas.width / 2 - player.width / 2;
    player.y = canvas.height - 80;
    enemies = [];
    bullets = [];
    lasers = [];
    explosions = [];
    gameState.score = 0;
    gameState.lives = 3;
    gameState.lastSpawnTime = 0;
    gameState.laserCooldown = 0;
    gameState.isPaused = false;
    updateHUD();
}

function updateHUD() {
    scoreDisplay.textContent = gameState.score;
    levelDisplay.textContent = gameState.difficulty.charAt(0).toUpperCase() + gameState.difficulty.slice(1);
    
    let heartsHTML = '';
    for (let i = 0; i < gameState.lives; i++) { heartsHTML += '❤️'; }
    livesDisplay.textContent = heartsHTML || '💀';
    
    if (gameState.laserCooldown > 0) {
        const seconds = Math.ceil(gameState.laserCooldown / 1000);
        laserDisplay.textContent = seconds + 's';
        laserDisplay.style.color = '#ff6666';
    } else {
        laserDisplay.textContent = 'Ready';
        laserDisplay.style.color = '#00ccff';
    }
}

// =========================================================
// OBJECT CREATION
// =========================================================
function createEnemy() {
    const settings = difficultySettings[gameState.difficulty];
    if (enemies.length >= settings.maxEnemies) return;
    
    const types = ['basic', 'fast', 'big'];
    const type = types[Math.floor(Math.random() * types.length)];
    
    let enemy = {
        x: Math.random() * (canvas.width - 40),
        y: -50,
        width: 40,
        height: 40,
        speed: settings.enemySpeed,
        type: type,
        health: 1
    };
    
    if (type === 'fast') {
        enemy.speed = settings.enemySpeed * 1.5;
        enemy.width = 30;
        enemy.height = 30;
        enemy.color = '#ff6600';
    } else if (type === 'big') {
        enemy.speed = settings.enemySpeed * 0.7;
        enemy.width = 55;
        enemy.height = 55;
        enemy.health = gameState.difficulty === 'hard' ? 3 : 2;
        enemy.color = '#ff0066';
    } else {
        enemy.color = '#ff3333';
    }
    enemies.push(enemy);
}

function createBullet() {
    const now = Date.now();
    if (now - lastBulletTime < 150) return; 
    
    lastBulletTime = now;
    bullets.push({
        x: player.x + player.width / 2 - 3,
        y: player.y,
        width: 6,
        height: 15,
        speed: 12,
        color: '#00ff88'
    });
    createParticles(player.x + player.width / 2, player.y, '#00ff88', 3);
}

function createLaser() {
    if (gameState.laserCooldown > 0) return;
    
    lasers.push({
        x: player.x + player.width / 2 - 10,
        y: 0,
        width: 20,
        height: player.y,
        duration: 500,
        startTime: Date.now(),
        color: '#00ccff'
    });
    
    gameState.laserCooldown = gameState.laserMaxCooldown;
    for (let i = 0; i < 10; i++) {
        createParticles(player.x + player.width / 2, Math.random() * player.y, '#00ccff', 5);
    }
}

function createExplosion(x, y, size) {
    explosions.push({
        x: x, y: y,
        radius: 5,
        maxRadius: size || 30,
        speed: 3,
        alpha: 1
    });
    createParticles(x, y, '#ff6600', 15);
    createParticles(x, y, '#ffcc00', 10);
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        stars.push({
            x: x, y: y,
            size: Math.random() * 4 + 2,
            speed: Math.random() * 3 + 1,
            angle: Math.random() * Math.PI * 2,
            color: color,
            isParticle: true,
            life: 30
        });
    }
}

// =========================================================
// CHEAT CODE
// =========================================================
function activateCheat() {
    const now = Date.now();
    if (now - lastCheatTime < 2000) return; 
    lastCheatTime = now;
    
    enemies.forEach(enemy => {
        createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, 40);
        gameState.score += 10 * difficultySettings[gameState.difficulty].scoreMultiplier;
    });
    
    enemies = [];
    monkeyOverlay.classList.remove('hidden');
    
    document.body.style.animation = 'none';
    document.body.offsetHeight; 
    document.body.style.animation = 'shake 0.5s ease-in-out';
    
    setTimeout(() => {
        monkeyOverlay.classList.add('hidden');
    }, 1500);
    
    updateHUD();
}

const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
        20%, 40%, 60%, 80% { transform: translateX(10px); }
    }
`;
document.head.appendChild(shakeStyle);

// =========================================================
// COLLISION DETECTION
// =========================================================
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function handleCollisions() {
    bullets.forEach((bullet, bulletIndex) => {
        enemies.forEach((enemy, enemyIndex) => {
            if (checkCollision(bullet, enemy)) {
                bullets.splice(bulletIndex, 1);
                enemy.health--;
                
                if (enemy.health <= 0) {
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
                    let points = 10;
                    if (enemy.type === 'fast') points = 15;
                    if (enemy.type === 'big') points = 25;
                    gameState.score += points * difficultySettings[gameState.difficulty].scoreMultiplier;
                    enemies.splice(enemyIndex, 1);
                    updateHUD();
                } else {
                    createParticles(bullet.x, bullet.y, '#ffffff', 5);
                }
            }
        });
    });
    
    lasers.forEach(laser => {
        enemies.forEach((enemy, enemyIndex) => {
            const laserRect = { x: laser.x, y: laser.y, width: laser.width, height: laser.height };
            if (checkCollision(laserRect, enemy)) {
                createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, 35);
                gameState.score += 20 * difficultySettings[gameState.difficulty].scoreMultiplier;
                enemies.splice(enemyIndex, 1);
                updateHUD();
            }
        });
    });
    
    enemies.forEach((enemy, enemyIndex) => {
        if (checkCollision(enemy, player)) {
            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
            enemies.splice(enemyIndex, 1);
            gameState.lives--;
            updateHUD();
            
            player.hit = true;
            setTimeout(() => { player.hit = false; }, 200);
            
            if (gameState.lives <= 0) { gameOver(); }
        }
    });
    
    enemies.forEach((enemy, enemyIndex) => {
        if (enemy.y > canvas.height) {
            enemies.splice(enemyIndex, 1);
            gameState.lives--;
            updateHUD();
            if (gameState.lives <= 0) { gameOver(); }
        }
    });
}

// =========================================================
// UPDATE FUNCTIONS
// =========================================================
function updatePlayer() {
    if (keys.left && player.x > 0) player.x -= player.speed;
    if (keys.right && player.x < canvas.width - player.width) player.x += player.speed;
    if (keys.space) createBullet();
    if (keys.l) { createLaser(); keys.l = false; }
    if (keys.z) { activateCheat(); keys.z = false; }
    if (keys.p) {
        const now = Date.now();
        if (now - lastPauseTime > 300) { togglePause(); lastPauseTime = now; }
        keys.p = false;
    }
}

function updateEnemies() {
    const settings = difficultySettings[gameState.difficulty];
    const now = Date.now();
    if (now - gameState.lastSpawnTime > settings.spawnInterval) {
        createEnemy();
        gameState.lastSpawnTime = now;
    }
    
    enemies.forEach(enemy => {
        enemy.y += enemy.speed;
        enemy.x += Math.sin(enemy.y * 0.05) * 0.5;
        if (enemy.x < 0) enemy.x = 0;
        if (enemy.x > canvas.width - enemy.width) enemy.x = canvas.width - enemy.width;
    });
}

function updateBullets() {
    bullets.forEach((bullet, index) => {
        bullet.y -= bullet.speed;
        if (bullet.y < -bullet.height) bullets.splice(index, 1);
    });
}

function updateLasers() {
    const now = Date.now();
    lasers.forEach((laser, index) => {
        if (now - laser.startTime > laser.duration) lasers.splice(index, 1);
    });
    
    if (gameState.laserCooldown > 0) {
        gameState.laserCooldown -= 16; 
        if (gameState.laserCooldown < 0) gameState.laserCooldown = 0;
        updateHUD();
    }
}

function updateExplosions() {
    explosions.forEach((explosion, index) => {
        explosion.radius += explosion.speed;
        explosion.alpha -= 0.05;
        if (explosion.alpha <= 0 || explosion.radius >= explosion.maxRadius) {
            explosions.splice(index, 1);
        }
    });
}

function updateStars() {
    stars.forEach((star, index) => {
        if (star.isParticle) {
            star.x += Math.cos(star.angle) * star.speed;
            star.y += Math.sin(star.angle) * star.speed;
            star.life--;
            if (star.life <= 0) stars.splice(index, 1);
        } else {
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        }
    });
}

// =========================================================
// DRAWING FUNCTIONS
// =========================================================
function drawPlayer() {
    ctx.save();
    if (player.hit) ctx.globalAlpha = 0.5;
    
    const x = player.x, y = player.y, w = player.width, h = player.height;
    
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x + w / 2, y + h - 15);
    ctx.lineTo(x, y + h);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#00ccff';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + 25, 8, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#00cc66';
    ctx.beginPath(); ctx.moveTo(x + 5, y + 35); ctx.lineTo(x - 15, y + h); ctx.lineTo(x + 15, y + h - 10); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + w - 5, y + 35); ctx.lineTo(x + w + 15, y + h); ctx.lineTo(x + w - 15, y + h - 10); ctx.closePath(); ctx.fill();
    
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.ellipse(x + w / 2, y + h + 5, 6, 10 + Math.random() * 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.ellipse(x + w / 2, y + h + 3, 3, 6 + Math.random() * 3, 0, 0, Math.PI * 2); ctx.fill();
    
    ctx.restore();
}

function drawEnemies() {
    enemies.forEach(enemy => {
        ctx.save();
        const x = enemy.x, y = enemy.y, w = enemy.width, h = enemy.height;
        
        ctx.fillStyle = enemy.color;
        ctx.beginPath();
        ctx.moveTo(x + w / 2, y + h);
        ctx.lineTo(x + w, y);
        ctx.lineTo(x + w / 2, y + 15);
        ctx.lineTo(x, y);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#330000';
        ctx.beginPath(); ctx.ellipse(x + w / 2, y + h - 15, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = enemy.color === '#ff3333' ? '#cc0000' : '#990033';
        ctx.beginPath(); ctx.moveTo(x + 5, y + 10); ctx.lineTo(x - 10, y); ctx.lineTo(x + 12, y + 15); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x + w - 5, y + 10); ctx.lineTo(x + w + 10, y); ctx.lineTo(x + w - 12, y + 15); ctx.closePath(); ctx.fill();
        
        if (enemy.health > 1) {
            ctx.fillStyle = '#333'; ctx.fillRect(x, y - 8, w, 4);
            ctx.fillStyle = '#00ff00'; ctx.fillRect(x, y - 8, (enemy.health / 3) * w, 4);
        }
        ctx.restore();
    });
}

function drawBullets() {
    bullets.forEach(bullet => {
        ctx.save();
        ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10;
        ctx.fillStyle = bullet.color; ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        ctx.fillStyle = 'rgba(0, 255, 136, 0.5)'; ctx.fillRect(bullet.x, bullet.y + bullet.height, bullet.width, 10);
        ctx.restore();
    });
}

function drawLasers() {
    lasers.forEach(laser => {
        ctx.save();
        const elapsed = Date.now() - laser.startTime;
        const alpha = 1 - (elapsed / laser.duration);
        
        ctx.fillStyle = `rgba(0, 204, 255, ${alpha * 0.3})`; ctx.fillRect(laser.x - 15, laser.y, laser.width + 30, laser.height);
        ctx.fillStyle = `rgba(0, 204, 255, ${alpha * 0.6})`; ctx.fillRect(laser.x - 5, laser.y, laser.width + 10, laser.height);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`; ctx.fillRect(laser.x + 5, laser.y, laser.width - 10, laser.height);
        ctx.restore();
    });
}

function drawExplosions() {
    explosions.forEach(explosion => {
        ctx.save();
        ctx.beginPath(); ctx.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 100, 0, ${explosion.alpha * 0.5})`; ctx.fill();
        ctx.beginPath(); ctx.arc(explosion.x, explosion.y, explosion.radius * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 200, 0, ${explosion.alpha * 0.8})`; ctx.fill();
        ctx.beginPath(); ctx.arc(explosion.x, explosion.y, explosion.radius * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${explosion.alpha})`; ctx.fill();
        ctx.restore();
    });
}

function drawStars() {
    stars.forEach(star => {
        ctx.save();
        if (star.isParticle) {
            ctx.globalAlpha = star.life / 30;
            ctx.fillStyle = star.color;
            ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
        } else {
            ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + Math.random() * 0.4})`;
            ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    });
}

function drawBackground() {
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, 'rgba(10, 10, 40, 1)');
    gradient.addColorStop(1, 'rgba(20, 20, 60, 1)');
    ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// =========================================================
// GAME CONTROL FUNCTIONS
// =========================================================
function startGame(difficulty) {
    gameState.difficulty = difficulty;
    gameState.isRunning = true;
    gameState.isPaused = false;
    
    menuOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    monkeyOverlay.classList.add('hidden');
    pauseOverlay.classList.add('hidden');
    
    resetGame();
    initStars();
    
    if (gameState.animationFrameId) cancelAnimationFrame(gameState.animationFrameId);
    gameState.lastSpawnTime = Date.now();
    gameLoop();
}

function togglePause() {
    if (!gameState.isRunning) return;
    gameState.isPaused = !gameState.isPaused;
    
    if (gameState.isPaused) {
        pauseOverlay.classList.remove('hidden');
    } else {
        pauseOverlay.classList.add('hidden');
        gameLoop();
    }
}

function gameOver() {
    gameState.isRunning = false;
    if (gameState.animationFrameId) cancelAnimationFrame(gameState.animationFrameId);
    finalScoreDisplay.textContent = gameState.score;
    setTimeout(() => { gameOverOverlay.classList.remove('hidden'); }, 500);
}

// =========================================================
// MAIN GAME LOOP
// =========================================================
function gameLoop() {
    if (!gameState.isRunning || gameState.isPaused) return;
    
    updatePlayer();
    updateEnemies();
    updateBullets();
    updateLasers();
    updateExplosions();
    updateStars();
    handleCollisions();
    
    drawBackground();
    drawStars();
    drawLasers();
    drawBullets();
    drawEnemies();
    drawPlayer();
    drawExplosions();
    
    gameState.animationFrameId = requestAnimationFrame(gameLoop);
}

// =========================================================
// BOOT
// =========================================================
initStars();
drawBackground();
drawStars();
</script>
